[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
authors = [{name = "Nikolaj T. Mücke", email = "nmucke@gmail.com"}]
dependencies = [
  "numpy>=2.3.5,<3",
  "xarray>=2025.12.0,<2026",
  "netcdf4>=1.7.3,<2",
  "matplotlib>=3.10.8,<4",
  "jax>=0.7.0,<0.8.0",
  "tqdm>=4.67.1,<5",
]
name = "pyurbanair"
requires-python = ">= 3.12,<3.13"
version = "0.1.0"

[tool.pixi.workspace]
preview = ["pixi-build"]
channels = ["conda-forge","robostack"]
platforms = ["osx-arm64","linux-64"]
conda-pypi-map = { "conda-forge" = "./conda-pypi-mapping.json" }

# conda-pypi-map = { "conda-forge" = "https://raw.githubusercontent.com/prefix-dev/parselmouth/main/files/mapping_as_grayskull.json" }

[tool.pixi.package.build]
backend = {name = "pixi-build-python", version = "*", channel = "https://prefix.dev/conda-forge" }

[tool.pixi.feature.delftblue.activation]
scripts = ["activation_scripts/delftblue_pyurbanair_activation.sh"]

[tool.hatch.build.targets.wheel]
packages = ["src/pyurbanair"]

[tool.pixi.feature.py312.dependencies]
python = {version="~=3.12.10", channel="conda-forge"}

# Pixi dependencies
[tool.pixi.dependencies]
python = ">=3.12"
pdbpp = ">=0.11.7,<0.12"
xarray = ">=2025.12.0,<2026"
netcdf4 = ">=1.7.3,<2"
numpy = ">=2.3.5,<3"
matplotlib = ">=3.10.8,<4"
trimesh = ">=4.10.1,<5"
rtree = ">=1.4.1,<2"
networkx = ">=3.6.1,<4"
scipy = ">=1.16.3,<2"

[tool.pixi.feature.udales.dependencies]
cmake = {version=">3.5.0,<4.0", channel="conda-forge"}
netcdf-fortran = {version=">=4.0.0", channel="conda-forge"}
gcc = {version=">=15.2.0", channel="conda-forge"}
gfortran = {version=">=15.2.0", channel="conda-forge"}
fftw = {version=">=3.3.8.0", channel="conda-forge"}
openmpi = {version=">=4.1.0", channel="conda-forge"}
nco = {version=">=5.3.6", channel="conda-forge"}

[tool.pixi.feature.lbm.dependencies]
fftw = {version=">=3.3.10", channel="conda-forge"}
netcdf-fortran = {version=">=4.6.2", channel="conda-forge"}
gfortran = {version=">=15.2.0", channel="conda-forge"}
gcc = {version=">=15.2.0", channel="conda-forge"}

[tool.pixi.pypi-dependencies]
pyurbanair = { path = ".", editable = true }

[tool.pixi.feature.udales.pypi-dependencies]
pyudales = { path = "libs/pyudales", editable = true }

[tool.pixi.feature.lbm.pypi-dependencies]
pylbm = { path = "libs/pylbm", editable = true }

[tool.pixi.feature.data-assimilation.pypi-dependencies]
data-assimilation = { path = "libs/data-assimilation", editable = true }

# Development tasks
[tool.black]
line-length = 88
target-version = ['py312']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
multi_line_output = 3
line_length = 88
known_first_party = ["pyurbanair"]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true



[tool.pixi.feature.dev.dependencies]
pytest= ">=8.3.5,<8.4"
pre-commit = {version="~=4.1.0", channel="conda-forge"}
black = {version="~=24.1.0", channel="conda-forge"}
isort = {version="~=6.0.0", channel="conda-forge"}
mypy = {version="~=1.15.0", channel="conda-forge"}


[tool.pixi.feature.dev.tasks]
"py.test" = { cmd = "py.test tests --exitfirst", description = "Run tests" }
pre-commit = { cmd = "pre-commit run", description = "Run pre-commit hooks on specific files" }
format = { cmd = "black src", description = "Format code" }
type-check = { cmd = "mypy src", description = "Type check code" }
sort-imports = { cmd = "isort src", description = "Sort imports" }

[tool.pixi.feature.benchmark_geometry.dependencies]
numpy = "*"
matplotlib = "*"
typer = "*"


[tool.pixi.environments]
default = { features = ["py312"] }
dev = { features = ["dev", "py312", "udales", "data-assimilation", "lbm", "benchmark_geometry"] }
delftblue = { features = ["delftblue", "dev", "py312", "udales", "data-assimilation", "lbm"] }
