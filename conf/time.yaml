# @package time
#
# Wall-clock settings for one simulation window. Canonical values for the
# time-varying rollout ESMDA; other run_* scripts read a subset. Rescale via the
# `size/` overlays or override on the CLI (`time.simulation_time=120`).
simulation_time: 5.0
output_frequency: 1.0
spinup_time: 5.0
