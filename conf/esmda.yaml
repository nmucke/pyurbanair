# @package esmda
#
# ESMDA settings shared by every run_*_esmda.py script. The smoother itself
# (the `smoother._target_` block) is NOT here: it is the one genuinely
# per-script piece, so each esmda script supplies it in its own primary config
# (conf/run_parameter_esmda.yaml, conf/run_state_and_parameter_esmda.yaml,
# conf/run_rollout_esmda.yaml, conf/run_time_varying_parameter_esmda.yaml,
# conf/time_varying_rollout_esmda.yaml). Forward-only scripts compose this file
# and simply ignore it.
#
# Localization lives in this namespace, not a separate group. `localization` is
# what every smoother receives (`localization: ${..localization}`) and is the
# adaptive correlation localization of Vossepoel et al. 2025. Run the global
# (unlocalized) Kalman update with `esmda.localization=null`.
num_steps: 2
alpha: ${.num_steps}
num_assimilation_windows: 5
seed: 42
obs_error_std: 0.25

localization:
  _target_: data_assimilation.localization.correlation.CorrelationLocalization
  # Correlation truncation threshold rho_t. null -> theoretical 3/sqrt(N_e).
  # The paper found tuned values in [0.3, 0.4] work best.
  truncation_correlation: null
  # Fraction of the truncation distance left un-tapered (beta in Eq. 9).
  tapering_beta: 0.5
  # Maximum error-variance inflation E_max at the truncation distance.
  max_inflation: 8.0
