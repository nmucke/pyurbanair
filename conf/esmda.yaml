# @package esmda
#
# ESMDA settings shared across the run_esmda.py modes. The smoother itself
# (the `_target_` block) is NOT here: it is the one genuinely mode-specific
# piece, selected via the `esmda/smoother` group (conf/esmda/smoother/
# {static,state_and_parameter,dynamic,state_and_dynamic}.yaml). conf/run_esmda.yaml
# mounts this file (`- esmda`) and a smoother default; forward-only scripts
# ignore it.
#
# Localization is a config GROUP: `esmda/localization=none|correlation|distance`
# (conf/esmda/localization/), each setting `esmda.localization` which every
# smoother receives (`localization: ${esmda.localization}`). The default is
# `none` (the global, unlocalized update). `none` -> correlation-based
# (Vossepoel et al. 2025) or physical-distance-based localization, both applied
# to the STATE rows only in the state-bearing smoothers. Tweak a chosen
# strategy's fields on the CLI (e.g. `esmda.localization.localization_radius=40`)
# or force the global update with `esmda.localization=null`.
num_steps: 2
alpha: ${.num_steps}
num_assimilation_windows: 1
seed: 42
obs_error_std: 0.25

# Default value; normally set by the `esmda/localization` group (default `none`).
localization: null
