defaults:
  - paths
  - case: xie_and_castro
  - time
  - ensemble
  - esmda
  - parameters
  - model@model: pylbm
  - model@truth_model: pylbm
  - model@assim_model: pylbm
  - size: null
  - preset: null
  - _self_

# One flat file per parameter category (conf/<category>.yaml) instead of a group
# of per-variant files. Each holds the full set of fields the most involved run
# case — scripts/run_time_varying_parameters_rollout_esmda.py — needs; every
# other run_* script reads a subset. Rescale a whole run with the `size/`
# overlays (`size=tiny` … `size=xlarge`). `model/` stays a group (one option per
# backend). The per-script esmda smoother is supplied by each esmda script's own
# primary config (see conf/run_*_esmda.yaml).
#
# The geometry-specific categories (`domain`, `obs`) live in the `case/` group
# (conf/case/<name>/), bundled by conf/case/<name>.yaml and switchable with
# `case=barcelona`; `case=xie_and_castro` is the default. `size/` and `preset/`
# still deep-merge over the case-provided domain/obs.

hydra:
  job:
    chdir: false
  run:
    dir: ${paths.base_results_dir}/hydra/${hydra.job.name}/${now:%Y-%m-%d}/${now:%H-%M-%S}

run:
  skip_viz: false
  results_dir: null
  # Forward-model knobs (scripts/run_forward_model.py): run an ensemble instead
  # of a single member with `run.ensemble=true`; roll the state forward over
  # `run.num_steps` windows (num_steps=1 -> a single forward).
  ensemble: false
  num_steps: 1
  use_true_params: false
  # Directory holding a pre-simulated ground truth (state.nc + params.nc), as
  # written by scripts/run_time_varying_forward_model.py. Only consumed by
  # scripts that load the truth from disk instead of simulating it (e.g.
  # run_time_varying_parameters_rollout_esmda_from_truth.py); null otherwise.
  ground_truth_dir: null
