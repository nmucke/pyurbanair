# UPT — small preset.
#
# Lighter than `medium` but with enough supernode coverage / latent capacity to
# actually resolve the dense grids (the old 32 / 2.5 / 16 sizing pooled a
# negligible fraction of the ~256k fluid cells).

_target_: neural_surrogates.UPT
dim: 128
num_latent_tokens: 64
num_supernodes: 128
gnn_dim: 128
enc_depth: 2
approx_depth: 4
dec_depth: 2
num_heads: 4
radius: 4.0
max_degree: 24
# Self-attention impl: dot_product (default), dot_product_slow, efficient,
# linformer, transsolver (see attention_kwargs for transsolver/linformer extras).
attention_type: dot_product
