# UPT — large preset.

_target_: neural_surrogates.UPT
dim: 384
num_latent_tokens: 256
num_supernodes: 512
gnn_dim: 256
enc_depth: 4
approx_depth: 6
dec_depth: 4
num_heads: 6
radius: 5.0
max_degree: 32
# Self-attention impl: dot_product (default), dot_product_slow, efficient,
# linformer, transsolver (see attention_kwargs for transsolver/linformer extras).
attention_type: dot_product
