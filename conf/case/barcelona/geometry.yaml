# @package geometry
#
# Geometry for the Barcelona case. All three backends share ONE STL (produced
# by tools/prepare_case_stl.py) at examples/<case>/buildings.stl. pylbm/pypalm
# read it directly via `stl_path`; uDALES requires the STL inside its case dir,
# so examples/udales/barcelona/ holds a relative symlink to the shared file
# (dereferenced into the run dir at prepare time — see libs/pyudales
# utils/file_utils.copy_files). `*_case_dir` are the per-backend dirs holding
# backend-specific config files (uDALES namoptions, PALM _p3d).
stl_path: examples/barcelona/buildings.stl
udales_case_dir: examples/udales/barcelona
palm_case_dir: examples/palm/barcelona
# Precomputed uDALES IBM geometry (solid_*/fluid_boundary_*/facet_sections_* +
# geom_meta.json), generated by tools/preprocess_udales_geometry.py and saved in
# this case folder. Reused instead of re-running the ~30+ min STL->IBM Fortran
# classifier over the 422k-facet mesh. The bundle is grid-specific; regenerate it
# if you change nx/ny/nz/bounds (a grid mismatch is caught via geom_meta.json).
# Set to null to force generating from the STL.
udales_precomputed_geom_dir: examples/udales/barcelona
