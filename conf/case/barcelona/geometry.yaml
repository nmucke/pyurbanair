# @package geometry
#
# Geometry paths for the Barcelona case. All three backends share ONE STL
# (produced by tools/prepare_case_stl.py): the canonical file lives at
# examples/<case>/buildings.stl. pylbm/pypalm read it directly via `stl_path`;
# uDALES requires the STL inside its case dir, so examples/udales/barcelona/
# holds a relative symlink to the shared file (dereferenced into the run dir at
# prepare time — see libs/pyudales utils/file_utils.copy_files).
lbm_stl_path: examples/barcelona/buildings.stl
udales_case_dir: examples/udales/barcelona
palm_case_dir: examples/palm/barcelona
palm_stl_path: examples/barcelona/buildings.stl
