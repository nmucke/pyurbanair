# @package geometry
#
# Geometry for the Xie & Castro case. All three backends share ONE STL at
# examples/<case>/xie_castro_2008_STL.stl. pylbm/pypalm read it directly via
# `stl_path`; uDALES holds a relative symlink to it inside its case dir
# (dereferenced into the run dir at prepare time). `*_case_dir` are the
# per-backend dirs holding backend-specific config files (uDALES namoptions,
# PALM _p3d). Absolute interpolation (`${geometry.stl_path}`) is used in the
# model configs because the model group may be mounted under several packages
# (model@model / @truth_model / @assim_model).
stl_path: examples/xie_and_castro/xie_castro_2008_STL.stl
udales_case_dir: examples/udales/xie_and_castro
palm_case_dir: examples/palm/xie_and_castro
