# @package domain
#
# Grid + physical bounds. One file per category (no per-size group): this holds
# the canonical domain for scripts/run_time_varying_parameters_rollout_esmda.py
# (the most involved run case); every other run_* script reads a subset. Rescale
# a whole run with the `size/` overlays (`size=tiny` … `size=xlarge`), which
# deep-merge over these values, or override individual fields on the CLI
# (`domain.nx=80`). x starts at -20 to leave an open upstream inflow region in
# front of the Xie & Castro array (which starts at x=5).
nx: 50
ny: 40
nz: 4
bounds:
  - [-20.0, 80.0]
  - [0.0, 80.0]
  - [0.0, 32.0]
