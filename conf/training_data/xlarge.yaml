# @package _global_
#
# Training-data generation — xlarge. Largest footprint (180x160x32) at
# full height. Shared skeleton + constant sampler fields live in
# conf/training_data/_base.yaml.

defaults:
  - _base
  - override /model: pylbm
  - _self_

domain:
  nx: 180
  ny: 160
  nz: 32
  bounds:
    - [-20.0, 160.0]
    - [0.0, 160.0]
    - [0.0, 64.0]

time:
  simulation_time: 300.0
  output_frequency: 5.0
  spinup_time: 10.0

training_data:
  num_train: 128
  num_val: 32
  num_test: 32

  output_dir: training_data/${model.name}_xlarge/

  num_time_points: 50
  num_parallel_processes: 8

  params_sampler:
    external:
      inflow_angle:
        mean: {min: -30.0, max: 30.0}
      velocity_magnitude:
        mean: {min: 3.0, max: 8.0}
