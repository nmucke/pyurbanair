# @package _global_
#
# Training-data generation — tiny. Smoke-run sizing: ~minute-scale per
# sample, used to validate the pipeline end-to-end. Shared skeleton +
# constant sampler fields live in conf/training_data/_base.yaml.

defaults:
  - _base
  - override /model: pyudales
  - _self_

domain:
  nx: 20
  ny: 20
  nz: 4
  bounds:
    - [0.0, 20.0]
    - [0.0, 20.0]
    - [0.0, 10.0]

time:
  simulation_time: 5.0
  output_frequency: 1.0
  spinup_time: 5.0

training_data:
  num_train: 4
  num_val: 2
  num_test: 2

  output_dir: training_data/${model.name}_tiny/

  num_time_points: 5
  num_parallel_processes: 2

  params_sampler:
    external:
      inflow_angle:
        mean: {min: -30.0, max: 30.0}
      velocity_magnitude:
        mean: {min: 7.0, max: 8.0}
