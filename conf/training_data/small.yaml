# @package _global_
#
# Training-data generation — small. First "real" dataset size; useful
# for prototyping the surrogate architecture. Uniform inflow sampler.

defaults:
  - override /model: pyudales
  - override /domain: small
  - _self_

training_data:
  num_train: 128
  num_val: 16
  num_test: 16

  output_dir: training_data/${model.name}_small/

  simulation_time: 300.0
  output_frequency: 1.0
  spinup_time: 10.0

  num_time_points: 10
  seed: 0

  # Parallel ensemble workers (see docs/ensemble_scaling.md for the
  # DRAM-bandwidth ceiling on this hardware — past ~4-8 workers returns
  # diminish). 1 = sequential.
  num_parallel_processes: 8

  # The sampler has two parts:
  #   external.<param>.{mean, std}: each may be a scalar (fixed for all
  #     sims) or a {min, max} dict (drawn uniformly per sim).
  #   time_series.*: hyperparameters of the AR(2)-relaxation that
  #     generates the smooth fluctuation z(t).
  # Per simulation: x(t) = mean_per_sim + std_per_sim * z(t).
  params_sampler:
    _target_: pyurbanair.training_data.UniformExternalAR2Sampler
    _convert_: all
    external:
      inflow_angle:
        mean: {min: -70.0, max: 70.0}   # uniform per sim
        std: 5.0                          # fixed (use {min, max} to sample)
      velocity_magnitude:
        mean: {min: 3.0, max: 8.0}        # uniform per sim
        std: 0.5                          # fixed
    time_series:
      correlation_length: 60.0
    ensemble_size: 1
