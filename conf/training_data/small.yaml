# @package _global_
#
# Training-data generation — small. First "real" dataset size; useful
# for prototyping the surrogate architecture. Shared skeleton + constant
# sampler fields live in conf/training_data/_base.yaml.

defaults:
  - _base
  - override /model: pyudales
  - _self_

domain:
  nx: 60
  ny: 40
  nz: 4
  bounds:
    - [-20.0, 40.0]
    - [0.0, 40.0]
    - [0.0, 10.0]

time:
  simulation_time: 120.0
  output_frequency: 5.0
  spinup_time: 10.0

training_data:
  num_train: 256
  num_val: 16
  num_test: 16

  output_dir: training_data/${model.name}_small/

  num_time_points: 10
  num_parallel_processes: 8

  params_sampler:
    external:
      inflow_angle:
        mean: {min: -70.0, max: 70.0}
      velocity_magnitude:
        mean: {min: 3.0, max: 10.0}
