# @package _global_
#
# Training-data generation — large. 180x80x16 grid with the full Xie &
# Castro array footprint. Shared skeleton + constant sampler fields live
# in conf/training_data/_base.yaml.

defaults:
  - _base
  - override /model: pylbm
  - _self_

domain:
  nx: 180
  ny: 80
  nz: 16
  bounds:
    - [-20.0, 160.0]
    - [0.0, 80.0]
    - [0.0, 32.0]

time:
  simulation_time: 240.0
  output_frequency: 5.0
  spinup_time: 10.0

training_data:
  num_train: 64
  num_val: 16
  num_test: 16

  output_dir: training_data/${model.name}_large/

  num_time_points: 50
  num_parallel_processes: 8

  params_sampler:
    external:
      inflow_angle:
        mean: {min: -30.0, max: 30.0}
      velocity_magnitude:
        mean: {min: 3.0, max: 8.0}
