# @package _global_
#
# Training-data generation — medium. Production-shape dataset at the
# 100x80x16 grid. Shared skeleton + constant sampler fields live in
# conf/training_data/_base.yaml.

defaults:
  - _base
  - override /model: pyudales
  - _self_

domain:
  nx: 100
  ny: 40
  nz: 16
  bounds:
    - [-20.0, 80.0]
    - [0.0, 40.0]
    - [0.0, 32.0]

time:
  simulation_time: 180.0
  output_frequency: 1.0
  spinup_time: 30.0

training_data:
  num_train: 200
  num_val: 8
  num_test: 8

  output_dir: training_data/${model.name}_medium/

  # Larger spin-up than the shared default for this grid.
  spinup_time: 30.0

  num_time_points: 9
  num_parallel_processes: 16

  params_sampler:
    external:
      inflow_angle:
        mean: {min: -70.0, max: 70.0}
      velocity_magnitude:
        mean: {min: 3.0, max: 10.0}
