# @package _global_
#
# Sizing overlay: xlarge — largest domain (Xie & Castro 100x80), longest
# horizon, most windows. Selects the matching per-group `xlarge` configs so each
# group (domain/time/ensemble/obs) lives in its own file. Individual groups stay
# overridable on the CLI — a command-line `domain=...`, `obs=...`, etc. wins
# over the selection here, e.g.
#   ... size=xlarge obs=grid_small domain=medium
# Expect long wall-clock times with the pyudales forward model.
defaults:
  - override /domain: xlarge
  - override /time: xlarge
  - override /ensemble: xlarge
  - override /obs: xlarge
  - _self_

# --- Per-size knobs (edit these to tune the run) ---------------------------
# These scalars override the values coming from the selected groups above and
# are the recommended single place to size a run. The Snellius submit wrapper
# (job_scripts/snellius/submit.sh) reads `ensemble.ensemble_size` from here to
# size the SLURM core request. Each is still overridable per-run on the CLI,
# e.g. `ensemble.ensemble_size=20 time.simulation_time=60 esmda.num_assimilation_windows=3`.
ensemble:
  ensemble_size: 96

time:
  simulation_time: 300.0

esmda:
  num_steps: 4
  num_assimilation_windows: 10

time_varying:
  num_time_points: 6
