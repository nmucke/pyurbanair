# @package _global_
#
# Sizing overlay: xlarge — largest domain (Xie & Castro 100x80), longest
# horizon, most windows. Self-contained: this file is the single place an
# `xlarge` run is sized. It inlines `domain`/`time` in full and overrides only
# the fields of `ensemble`/`obs`/`esmda`/params that scale with the run;
# size-invariant fields (obs mode/states/temporal_mode, ensemble failure policy,
# esmda kind/seed/obs_error_std) stay in the base groups selected by
# conf/config.yaml. Expect long wall-clock times with the pyudales forward
# model. Override any field per-run on the CLI. The Snellius/DelftBlue submit
# wrappers read `ensemble.ensemble_size` from here to size the SLURM core
# request.

domain:
  nx: 180
  ny: 160
  nz: 32
  bounds:
    - [-20.0, 160.0]
    - [0.0, 160.0]
    - [0.0, 64.0]

time:
  simulation_time: 300.0
  output_frequency: 5.0
  spinup_time: 10.0

ensemble:
  ensemble_size: 96
  num_parallel_processes: 4

esmda:
  num_steps: 4
  num_assimilation_windows: 10

# Knots per window for the time-varying AR(2) inflow parameters, applied to
# every params package mount: base `params` (run_forward_model.py) and the
# truth/prior pair (run_esmda.py). Assumes the dynamic params variants; drop
# or override when mounting `static` params (they take no time_coords).
params:
  time_coords:
    num: 6
truth_params:
  time_coords:
    num: 6
prior_params:
  time_coords:
    num: 6

# Sensor placement. All (x,y,z) must fall inside `domain.bounds`
# ([-20,160] x [0,160] x [0,64]) and outside the buildings. x=-10 sits in the
# open upstream inflow region; the N-S lanes at x in {20, 40, 60, 80, 100, 120,
# 140} fall in the gaps between cube columns across the full array. Lengths must
# match.
obs:
  x_points: [-10.0, 20.0, 60.0, 100.0, 140.0, 40.0, 80.0, 120.0, 20.0, 100.0]
  y_points: [80.0, 30.0, 120.0, 60.0, 100.0, 150.0, 20.0, 90.0, 140.0, 150.0]
  z_points: [5.0, 5.0, 5.0, 5.0, 5.0, 5.0, 5.0, 5.0, 5.0, 5.0]
  interval_seconds: 20.0
