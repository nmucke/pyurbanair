# @package _global_
defaults:
  - _self_

# Sizing-only overlay (model-agnostic). See conf/size/tiny.yaml for rationale.
#
# medium: taller domain, larger ensemble, more windows.

domain:
  nx: 60
  ny: 40
  nz: 8
  bounds:
    - [0.0, 60.0]
    - [0.0, 40.0]
    - [0.0, 16.0]

time:
  simulation_time: 60.0
  output_frequency: 5.0
  spinup_time: 10.0

ensemble:
  ensemble_size: 16
  num_parallel_processes: 8
  num_cpus_per_process: 1
  failure:
    policy: resample_from_successes
    jitter_scale: 0.05
    seed: 0

obs:
  # Explicit observation locations. Edit these lists to place sensors;
  # all three must have the same length. Coordinates are in domain units
  # and must fall inside `domain.bounds` ([0,60] x [0,40] x [0,16] here).
  mode: points
  x_points: [10.0, 25.0, 40.0, 55.0, 30.0]
  y_points: [10.0, 30.0, 20.0, 35.0, 5.0]
  z_points: [3.0, 3.0, 3.0, 3.0, 3.0]
  states: [u, v, w]
  temporal_mode: intervals
  interval_size: 3
  aggregation_mode: mean

esmda:
  num_steps: 2
  num_assimilation_windows: 5

time_varying:
  num_time_points: 4
