# @package _global_
#
# Sizing overlay: medium. Self-contained: this file is the single place a
# `medium` run is sized. It inlines `domain`/`time` in full and overrides only
# the fields of `ensemble`/`obs`/`esmda`/`time_varying` that scale with the run;
# size-invariant fields (obs mode/states/temporal_mode, ensemble failure policy,
# esmda kind/seed/obs_error_std) stay in the base groups selected by
# conf/config.yaml. Override any field per-run on the CLI, e.g.
# `size=medium ensemble.ensemble_size=32 esmda.num_assimilation_windows=3`. The
# Snellius/DelftBlue submit wrappers read `ensemble.ensemble_size` from here to
# size the SLURM core request.

domain:
  nx: 50
  ny: 40
  nz: 16
  bounds:
    - [-20.0, 80.0]
    - [0.0, 80.0]
    - [0.0, 32.0]

time:
  simulation_time: 300.0
  output_frequency: 5.0
  spinup_time: 10.0

ensemble:
  ensemble_size: 64
  num_parallel_processes: 4

esmda:
  num_steps: 3
  num_assimilation_windows: 5

time_varying:
  num_time_points: 5

# Sensor placement. All (x,y,z) must fall inside `domain.bounds`
# ([-20,80] x [0,80] x [0,32]) and outside the buildings. x=-10 sits in the open
# upstream inflow region; the N-S lanes at x in {20, 40, 60} fall in the gaps
# between cube columns. Lengths must match.
obs:
  x_points: [-10.0, 20.0, 40.0, 60.0, 20.0, 40.0]
  y_points: [40.0, 20.0, 60.0, 30.0, 70.0, 10.0]
  z_points: [5.0, 5.0, 5.0, 5.0, 5.0, 5.0]
  interval_seconds: 15.0
