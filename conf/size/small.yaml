# @package _global_
#
# Sizing overlay: small — quick end-to-end run. Selects the matching per-group
# `small` configs so each group (domain/time/ensemble/obs) lives in its own
# file. Individual groups stay overridable on the CLI — a command-line
# `domain=...`, `obs=...`, etc. wins over the selection here, e.g.
#   ... size=small obs=grid_small domain=tiny
#
# The two scalars below are *not* swappable groups: the `esmda` group encodes an
# assimilation method and `time_varying` a stochastic model, so their size-
# dependent counts are set inline on top of whatever method/model is selected.
# Override per-run with `esmda.num_steps=... time_varying.num_time_points=...`.
defaults:
  - override /domain: small
  - override /time: small
  - override /ensemble: small
  - override /obs: small
  - _self_

esmda:
  num_steps: 2
  num_assimilation_windows: 5

time_varying:
  num_time_points: 5
