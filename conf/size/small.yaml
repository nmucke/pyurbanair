# @package _global_
#
# Sizing overlay: small — quick end-to-end run. Self-contained: this file is the
# single place a `small` run is sized. It inlines `domain`/`time` in full and
# overrides only the fields of `ensemble`/`obs`/`esmda`/`time_varying` that
# scale with the run; size-invariant fields (obs mode/states/temporal_mode,
# ensemble failure policy, esmda kind/seed/obs_error_std) stay in the base
# groups selected by conf/config.yaml. Override any field per-run on the CLI,
# e.g. `size=small ensemble.ensemble_size=20 time.simulation_time=120`. The
# Snellius/DelftBlue submit wrappers read `ensemble.ensemble_size` from here to
# size the SLURM core request.

domain:
  nx: 60
  ny: 40
  nz: 4
  bounds:
    - [-20.0, 40.0]
    - [0.0, 40.0]
    - [0.0, 10.0]

time:
  simulation_time: 180.0
  output_frequency: 5.0
  spinup_time: 30.0

ensemble:
  ensemble_size: 64
  num_parallel_processes: 1

esmda:
  num_steps: 3
  num_assimilation_windows: 10

time_varying:
  num_time_points: 3

# Sensor placement. All (x,y,z) must fall inside `domain.bounds`
# ([-20,40] x [0,40] x [0,10]) and outside the buildings. x=-10 sits in the open
# upstream inflow region; the N-S lanes at x in {2.5, 20, 38} fall in the gaps
# between cube columns. Lengths must match.
obs:
  x_points: [-10.0, 2.5, 20.0, 20.0, 38.0]
  y_points: [20.0, 10.0, 20.0, 35.0, 10.0]
  z_points: [3.0, 3.0, 3.0, 3.0, 3.0]
  interval_size: 3
