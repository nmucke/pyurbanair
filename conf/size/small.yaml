# @package _global_
#
# Sizing overlay: small — quick end-to-end run. Selects the matching per-group
# `small` configs so each group (domain/time/ensemble/obs) lives in its own
# file. Individual groups stay overridable on the CLI — a command-line
# `domain=...`, `obs=...`, etc. wins over the selection here, e.g.
#   ... size=small obs=grid_small domain=tiny
defaults:
  - override /domain: small
  - override /time: small
  - override /ensemble: small
  - override /obs: small
  - _self_

# --- Per-size knobs (edit these to tune the run) ---------------------------
# These scalars override the values coming from the selected groups above and
# are the recommended single place to size a run. The Snellius submit wrapper
# (job_scripts/snellius/submit.sh) reads `ensemble.ensemble_size` from here to
# size the SLURM core request. Each is still overridable per-run on the CLI,
# e.g. `ensemble.ensemble_size=20 time.simulation_time=60 esmda.num_assimilation_windows=3`.
ensemble:
  ensemble_size: 8

time:
  simulation_time: 60.0

esmda:
  num_steps: 1
  num_assimilation_windows: 2

time_varying:
  num_time_points: 2
