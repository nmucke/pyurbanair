# @package _global_
#
# Sizing overlay: tiny — fastest smoke run. Selects the matching per-group
# `tiny` configs so each group (domain/time/ensemble/obs) lives in its own file.
# Individual groups stay overridable on the CLI — a command-line `domain=...`,
# `obs=...`, etc. wins over the selection here, e.g.
#   ... size=tiny obs=grid_small domain=small
#
# The two scalars below are *not* swappable groups: the `esmda` group encodes an
# assimilation method and `time_varying` a stochastic model, so their size-
# dependent counts are set inline on top of whatever method/model is selected.
# Override per-run with `esmda.num_steps=... time_varying.num_time_points=...`.
defaults:
  - override /domain: tiny
  - override /time: tiny
  - override /ensemble: tiny
  - override /obs: tiny
  - _self_

esmda:
  num_steps: 1
  num_assimilation_windows: 2

time_varying:
  num_time_points: 3
