# @package paths
#
# Output roots. Everything mutable lands under `.temp/` by default.
results_dir: .temp/${model.name}
# Absolute scratch dir for the solvers (pylbm/pyudales/pypalm chdir into it, so
# it must stay absolute and stable across chdirs). Resolve from the launch
# directory via $PWD rather than Hydra's ${hydra:runtime.cwd}: the latter raises
# "HydraConfig was not set" on direct run(cfg) calls (every test composes the
# config with hydra.compose, which does not populate the HydraConfig singleton).
# Under a normal Hydra launch (hydra.job.chdir=false) $PWD equals the launch cwd,
# so this matches the previous behaviour.
experiment_dir : ${oc.env:PWD}/.temp_lbm
# Fallback output root used by resolve_output_dir() when Hydra isn't initialized
# (i.e. direct run(cfg) calls from tests). With Hydra active the run dir comes
# from hydra.runtime.output_dir instead.
base_results_dir: .temp_lbm

