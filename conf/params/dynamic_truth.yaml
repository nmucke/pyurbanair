# Time-varying TRUTH parameters. Same AR2RelaxationModel as the dynamic prior,
# but with distinct external means / seed so the truth trajectory is not drawn
# from the assimilation prior's generative process (anti-inverse-crime).
# Mounted as `params@truth_params` by run_esmda.yaml; the assimilation prior is
# the separate `params@prior_params=dynamic`.
_target_: pyurbanair.dynamic_parameters.ar2_relaxation.AR2RelaxationModel
_convert_: all
correlation_length: 100.0
seed: 7
external_parameters:
  inflow_angle:
    _target_: pyurbanair.static_parameters.Normal
    mean: 25.0
    std: 6.0
  velocity_magnitude:
    _target_: pyurbanair.static_parameters.Normal
    mean: 6.0
    std: 0.5
    min: 0.1
time_coords:
  _target_: numpy.linspace
  start: 0.0
  stop: ${time.simulation_time}
  num: 5
