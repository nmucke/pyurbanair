# @package _global_

defaults:
  - /neural_surrogate_architectures/upt@architecture: large
  - _self_

model_name: upt_large

trainer:
  _target_: neural_surrogates.Trainer
  num_epochs: 500
  device: cuda
  patience: 10

optimizer:
  _target_: torch.optim.Adam
  lr: 1.0e-3

loss:
  _target_: torch.nn.MSELoss

dataset:
  _target_: neural_surrogates.TransitionDataset
  root_dir: training_data/pyudales_small
  state_vars:
    - u
    - v
    - w
  param_vars: null
  cache: false
  dtype: float32
  pushforward_steps: 5

dataloader:
  _target_: torch.utils.data.DataLoader
  batch_size: 32
  shuffle: true
  num_workers: 0
