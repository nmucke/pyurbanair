# @package _global_

defaults:
  - /neural_surrogate_architectures/upt@architecture: medium
  - _self_

model_name: upt_medium

trainer:
  _target_: neural_surrogates.Trainer
  num_epochs: 500
  device: cuda
  patience: 20
  # Mixed precision (fp16 autocast + grad scaling) on CUDA; ignored on CPU.
  amp: true
  # Rollout-length curriculum: begin with `pushforward_start_steps`-step
  # rollouts and add one step every `pushforward_epochs_per_step` epochs, up to
  # `dataset.pushforward_steps`. Set the cadence to null to train at a fixed
  # horizon (the original pushforward behavior).
  pushforward_epochs_per_step: 10
  pushforward_start_steps: 1  
  # Warmup + cosine LR schedule: ramp from `lr_warmup_start` up to the
  # optimizer's peak LR over `lr_warmup_epochs`, then cosine-anneal to `lr_min`
  # over the remaining epochs. Set `lr_warmup_epochs` to null to disable.
  lr_warmup_epochs: 5
  lr_warmup_start: 1.0e-5
  lr_min: 1.0e-5

optimizer:
  _target_: torch.optim.Adam
  lr: 1.0e-3

loss:
  _target_: torch.nn.MSELoss

dataset:
  _target_: neural_surrogates.TransitionDataset
  root_dir: training_data/pyudales_medium
  state_vars:
    - u
    - v
    - w
  param_vars: null
  cache: false
  dtype: float32
  pushforward_steps: 10

dataloader:
  _target_: torch.utils.data.DataLoader
  batch_size: 4
  shuffle: true
  num_workers: 0
