# Primary config for scripts/run_parameter_esmda.py.
#
# Extends the shared base config and supplies the parameter-only smoother. All
# other groups (domain, time, ensemble, obs, parameters, model, size, …) remain
# selectable on the CLI exactly as with the base config.
defaults:
  - config
  - _self_

esmda:
  # Localization handed to the smoother below; `esmda.localization=null` runs
  # the global (unlocalized) update. (Default also set in conf/esmda.yaml.)
  localization:
    _target_: data_assimilation.localization.correlation.CorrelationLocalization
    truncation_correlation: null
    tapering_beta: 0.5
    max_inflation: 8.0
  smoother:
    _target_: data_assimilation.smoothing.esmda.ParameterESMDA
    num_steps: ${..num_steps}
    alpha: ${..alpha}
    localization: ${..localization}
