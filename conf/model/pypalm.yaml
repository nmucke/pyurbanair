name: pypalm
solver_name: palm
compile: false

forward_model:
  _target_: pypalm.forward_model.ForwardModel
  _convert_: all
  # Experiment dir + STL geometry follow the selected `case`.
  case_dir: ${geometry.palm_case_dir}
  stl_path: ${geometry.stl_path}
  # Base scratch dir shared across models; pypalm nests <temp_dir>/experiment/urban_run.
  temp_dir: ${paths.experiment_dir}
  experiment_name: urban_run
  ncpu: 1
  save_only_last_timestep: false
  verbose: false
  boundary_condition: inflow_outflow
  nudging_config:
    profile_config:
      type: power_law
      alpha: 0.25
  nx: ${domain.nx}
  ny: ${domain.ny}
  nz: ${domain.nz}
  bounds: ${domain.bounds}
  simulation_time: ${time.simulation_time}
  output_frequency: ${time.output_frequency}
  spinup_time: ${time.spinup_time}

prepare:
  _target_: pyurbanair.config.hydra_helpers.prepare_compile
  compile: ${..compile}

ensemble_model:
  _target_: pypalm.ensemble_forward_model.EnsembleForwardModel
  _convert_: all
  ensemble_size: ${ensemble.ensemble_size}
  num_parallel_processes: ${ensemble.num_parallel_processes}
  num_cpus_per_process: ${ensemble.num_cpus_per_process}
  # Resample numerically-diverged members from a successful donor instead of
  # aborting the whole run. PALM handles the divergence itself (it terminates
  # without writing a 3D output); pypalm reports the missing output as a member
  # failure so this policy can replace it.
  failure: ${ensemble.failure}
