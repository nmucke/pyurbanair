# Primary config for scripts/run_rollout_esmda.py.
#
# Extends the shared base config and supplies the joint state+parameter smoother
# used in the multi-window rollout. All other groups remain selectable on the
# CLI.
defaults:
  - config
  - _self_

esmda:
  # localization (and num_steps/alpha) come from conf/esmda.yaml; the smoother
  # wires it through via `localization: ${..localization}`. Override the default
  # with `esmda.localization=...`, or `esmda.localization=null` for the global
  # (unlocalized) update.
  smoother:
    _target_: data_assimilation.smoothing.esmda.StateAndParameterESMDA
    num_steps: ${..num_steps}
    alpha: ${..alpha}
    localization: ${..localization}
