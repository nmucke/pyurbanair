# GATE evaluation config (docs/neural_surrogate_plan.md §13). Consumed only by
# scripts/eval_surrogate_gate.py. Bars are pre-stated; tune to the corpus.
checkpoint_path: ???
corpus_path: ???
split: val
horizon: 8                 # a full assimilation window's worth of steps
b1: 0.5                    # clean rollout-error-vs-horizon bar
