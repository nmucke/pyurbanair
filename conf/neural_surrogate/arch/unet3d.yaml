# 3D conv UNet hyperparameters (docs/neural_surrogate_plan.md §1.2, §8.3).
# This block is snapshotted into the checkpoint manifest (architecture.json),
# since the architecture choice fixes the meaning of the trained weights.
# Runtime dims (in_state_channels / static_channels / history_len / param_dim)
# are injected by the trainer from the corpus — NOT set here.
name: unet3d
base_channels: 32
channel_multipliers: [1, 2, 4]   # len = num_levels; needs nx/ny/nz divisible by 2^(levels-1) (pad/crop otherwise)
num_res_blocks_per_level: 2
norm: group
groups: 8
activation: silu
embed_dim: 128
residual: true                   # predict Δfield added to last frame (stability)
