# Corpus-generation knobs (docs/neural_surrogate_plan.md §5, §8.3). Read by
# scripts/generate_neural_surrogate_data.py under the `generate` namespace
# (composed onto the main config). Do the §5 sizing table BEFORE generating.
corpus_path: .temp/neural_surrogate/corpus
# STL for geometry voxelization (D5). Defaults to the model's
# forward_model.stl_path when present (pylbm); set explicitly for backends
# without one (e.g. uDALES, which uses case_dir).
stl_path: null
n_trajectories: 64
dtype: float32                  # fp16 halves storage; pick deliberately (§5 sizing)
include_pressure: false
val_fraction: 0.1
test_fraction: 0.1
seed: 0

# Static geometry channels baked once at the corpus root (D5).
geometry_static:
  include_sdf: true
  include_mask: true
