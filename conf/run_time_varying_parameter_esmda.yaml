# Primary config for scripts/run_time_varying_parameter_esmda.py.
#
# Extends the shared base config and supplies the time-varying-parameter
# smoother (single window; no initial-time-point pinning). All other groups
# remain selectable on the CLI.
defaults:
  - config
  - _self_

esmda:
  # Localization handed to the smoother below; `esmda.localization=null` runs
  # the global (unlocalized) update. (Default also set in conf/esmda.yaml.)
  localization:
    _target_: data_assimilation.localization.correlation.CorrelationLocalization
    truncation_correlation: null
    tapering_beta: 0.5
    max_inflation: 8.0
  smoother:
    _target_: data_assimilation.smoothing.esmda.TimeVaryingParameterESMDA
    num_steps: ${..num_steps}
    alpha: ${..alpha}
    num_time_points: ${time_varying.num_time_points}
    localization: ${..localization}
