# @package _global_
defaults:
  - _self_

# Keep presets as explicit root-level overlays. Hydra 1.3 merges group
# overrides from CLI-selected presets in surprising ways for nested mappings.
domain:
  nx: 40
  ny: 40
  nz: 4
  bounds:
    - [0.0, 40.0]
    - [0.0, 40.0]
    - [0.0, 10.0]

time:
  simulation_time: 5.0
  output_frequency: 1.0
  spinup_time: 5.0

ensemble:
  ensemble_size: 4
  num_parallel_processes: 1
  num_cpus_per_process: 1
  failure:
    policy: resample_from_successes
    jitter_scale: 0.05
    seed: 0

obs:
  mode: grid
  x_min: 5.0
  x_max: 35.0
  y_min: 5.0
  y_max: 35.0
  n_per_axis: 2
  z: 2.0
  states: [u, v, w]
  temporal_mode: mean
  aggregation_mode: null

esmda:
  num_steps: 1
  num_assimilation_windows: 3
  obs_error_std: 0.1

params:
  "true":
    inflow_angle: 30.0
  prior:
    inflow_angle:
      std: 8.0
    velocity_magnitude:
      mean: 3.0
  external:
    inflow_angle:
      std: 8.0
    velocity_magnitude:
      mean: 3.0
      std: 1.0

time_varying:
  num_time_points: 3
  method: gp_linear_trend
  method_kwargs:
    correlation_length: 2.0
    slope_damping_time: null
  truth_method: gp_linear_trend
  truth_method_kwargs:
    correlation_length: 1.0
