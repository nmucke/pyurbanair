# Sizing obs: xlarge. Override with `obs=...` on the CLI.
#
# Sensor placement. All (x,y,z) must fall inside `domain.bounds`
# ([-20,160] x [0,160] x [0,64] for size=xlarge) and outside the buildings. The
# Xie & Castro array is a staggered grid of 10x10 cubes (period 20 in x and y,
# height 17.2). x=-10 sits in the open upstream inflow region; the N-S lanes at
# x in {20, 40, 60, 80, 100, 120, 140} fall in the gaps between cube columns and
# stay open for every y, so sensors are spread along them across the full array.
# Lengths of x/y/z_points must match. (Verified against the case STL.)
mode: points
x_points: [-10.0, 20.0, 60.0, 100.0, 140.0, 40.0, 80.0, 120.0, 20.0, 100.0]
y_points: [80.0, 30.0, 120.0, 60.0, 100.0, 150.0, 20.0, 90.0, 140.0, 150.0]
z_points: [5.0, 5.0, 5.0, 5.0, 5.0, 5.0, 5.0, 5.0, 5.0, 5.0]
states: [u, v, w]
temporal_mode: intervals
interval_size: 4
aggregation_mode: mean
