# Primary config for scripts/run_time_varying_parameters_rollout_esmda.py — the
# most involved run case.
#
# Extends the shared base config and supplies the time-varying smoother with
# `pin_initial_time_point: true` (the script also passes `time_coords` and
# re-toggles `pin_initial_time_point` per window; see the window loop). All
# other groups (domain, time, ensemble, obs, parameters, model, size, …) remain
# selectable on the CLI exactly as with the base config.
defaults:
  - config
  - _self_

esmda:
  # localization (and num_steps/alpha) come from conf/esmda.yaml; the smoother
  # wires it through via `localization: ${..localization}`. Override the default
  # with `esmda.localization=...`, or `esmda.localization=null` for the global
  # (unlocalized) update.
  smoother:
    _target_: data_assimilation.smoothing.esmda.TimeVaryingParameterESMDA
    num_steps: ${..num_steps}
    alpha: ${..alpha}
    num_time_points: ${time_varying.num_time_points}
    pin_initial_time_point: true
    localization: ${..localization}
